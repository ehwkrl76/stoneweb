<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기본 설정 | Stone Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <aside class="sidebar">
        <div class="admin-logo">STONE <span>ADMIN</span></div>
        <nav class="nav-menu">
            <a href="admin.html" class="nav-item">📊 대시보드</a>
            <a href="admin-portfolio.html" class="nav-item">💼 포트폴리오 관리</a>
            <a href="admin-services.html" class="nav-item">✨ 서비스/가격 관리</a>
            <a href="admin-inquiries.html" class="nav-item">📩 상담 문의 내역</a>
            <a href="admin-settings.html" class="nav-item active">⚙️ 기본 설정</a>
        </nav>
        <div class="footer-nav">
            <a href="index.html" class="nav-item">🏠 홈페이지 바로가기</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <h2>기본 사이트 설정</h2>
            <div class="user-meta">
                <span>관리자님, 안녕하세요</span>
                <button class="btn-sm" onclick="location.href='admin-login.html'">로그아웃</button>
            </div>
        </header>

        <main class="content-area">
            <div class="data-card">
                <div class="card-header">
                    <h3>비즈니스 정보 설정</h3>
                </div>
                <div style="padding: 30px; max-width: 800px;">
                    <div class="admin-form-group">
                        <label>대표 이메일</label>
                        <input type="email" value="stone@studio.com">
                    </div>
                    <div class="admin-form-group">
                        <label>대표 전화번호</label>
                        <input type="text" value="02-123-4567">
                    </div>
                    <div class="admin-form-group">
                        <label>대표자명</label>
                        <input type="text" value="김한석">
                    </div>
                    <div class="admin-form-group">
                        <label>회사 주소</label>
                        <input type="text" value="서울특별시 강남구 테헤란로 123, 10층">
                    </div>
                    <div class="admin-form-group">
                        <label>상담 가능 시간</label>
                        <input type="text" value="AM 10:00 ~ PM 06:00 (주말/공휴일 제외)">
                    </div>
                    <div style="margin-top: 30px;">
                        <button class="btn-sm btn-blue" onclick="alert('설정이 저장되었습니다.')">변경사항 저장하기</button>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <div class="card-header">
                    <h3>계좌 정보 관리</h3>
                </div>
                <div style="padding: 30px; max-width: 800px;">
                    <div class="admin-form-group">
                        <label>입금 은행명</label>
                        <input type="text" value="국민은행">
                    </div>
                    <div class="admin-form-group">
                        <label>계좌 번호</label>
                        <input type="text" value="123456-78-901234">
                    </div>
                    <div class="admin-form-group">
                        <label>예금주명</label>
                        <input type="text" value="(주)스톤웹스튜디오">
                    </div>
                    <div style="margin-top: 30px;">
                        <button class="btn-sm btn-blue" onclick="alert('계좌 정보가 업데이트되었습니다.')">업데이트</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
