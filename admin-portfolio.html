<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 관리 | Stone Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <aside class="sidebar">
        <div class="admin-logo">STONE <span>ADMIN</span></div>
        <nav class="nav-menu">
            <a href="admin.html" class="nav-item">📊 대시보드</a>
            <a href="admin-portfolio.html" class="nav-item active">💼 포트폴리오 관리</a>
            <a href="admin-services.html" class="nav-item">✨ 서비스/가격 관리</a>
            <a href="admin-inquiries.html" class="nav-item">📩 상담 문의 내역</a>
            <a href="admin-settings.html" class="nav-item">⚙️ 기본 설정</a>
        </nav>
        <div class="footer-nav">
            <a href="index.html" class="nav-item">🏠 홈페이지 바로가기</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <h2>포트폴리오 관리</h2>
            <div class="user-meta">
                <span>관리자님, 안녕하세요</span>
                <button class="btn-sm" onclick="location.href='admin-login.html'">로그아웃</button>
            </div>
        </header>

        <main class="content-area">
            <div class="data-card">
                <div class="card-header">
                    <h3>등록된 포트폴리오 (6개)</h3>
                    <button class="btn-sm btn-blue" onclick="openModal('add')">+ 새 프로젝트 추가</button>
                </div>
                <div style="padding: 24px;" class="portfolio-admin-grid">
                    <!-- Item 1 -->
                    <div class="portfolio-admin-item">
                        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80"
                            style="width:100%; height:200px; object-fit:cover;">
                        <div class="item-content">
                            <h4>테크 이노베이션 오피스</h4>
                            <p style="font-size:13px; color:#666; margin:5px 0 15px;">Corporate / Web Design</p>
                            <div class="item-actions">
                                <button class="btn-sm flex-1" onclick="openModal('edit', '테크 이노베이션 오피스')">수정</button>
                                <button class="btn-sm btn-red flex-1" onclick="deleteItem()">삭제</button>
                            </div>
                        </div>
                    </div>
                    <!-- Item 2 -->
                    <div class="portfolio-admin-item">
                        <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=800&q=80"
                            style="width:100%; height:200px; object-fit:cover;">
                        <div class="item-content">
                            <h4>글로벌 크리에이티브 스튜디오</h4>
                            <p style="font-size:13px; color:#666; margin:5px 0 15px;">Agency / Branding</p>
                            <div class="item-actions">
                                <button class="btn-sm flex-1" onclick="openModal('edit', '글로벌 크리에이티브 스튜디오')">수정</button>
                                <button class="btn-sm btn-red flex-1" onclick="deleteItem()">삭제</button>
                            </div>
                        </div>
                    </div>
                    <!-- More items can be added here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">프로젝트 수정</h3>
                <button onclick="closeModal()"
                    style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="admin-form-group">
                    <label>프로젝트명</label>
                    <input type="text" id="proj-name">
                </div>
                <div class="admin-form-group">
                    <label>카테고리</label>
                    <input type="text" id="proj-cat">
                </div>
                <div class="admin-form-group">
                    <label>이미지 URL</label>
                    <input type="text" id="proj-img">
                </div>
                <div class="admin-form-group">
                    <label>상세 설명</label>
                    <textarea rows="4" id="proj-desc"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-sm" onclick="closeModal()">취소</button>
                <button class="btn-sm btn-blue" onclick="saveData()">변경사항 저장</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(mode, name = '') {
            document.getElementById('edit-modal').classList.add('active');
            document.getElementById('modal-title').innerText = mode === 'add' ? '새 프로젝트 추가' : '프로젝트 수정';
            if (name) document.getElementById('proj-name').value = name;
        }
        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }
        function saveData() {
            alert('성공적으로 저장되었습니다!');
            closeModal();
        }
        function deleteItem() {
            if (confirm('정말 삭제하시겠습니까?')) {
                alert('삭제되었습니다.');
            }
        }
    </script>
</body>

</html>
